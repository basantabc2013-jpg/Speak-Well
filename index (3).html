<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speak Well</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1C2333" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Speak Well" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --base:        #1C2333;
      --base-soft:   #243044;
      --surface:     #F7F5F0;
      --surface-alt: #EEEAE3;
      --text:        #1C2333;
      --text-soft:   #5A6278;
      --text-inv:    #F7F5F0;
      --teal:        #4ECDC4;
      --teal-light:  #E8F9F8;
      --amber:       #F7B731;
      --amber-light: #FEF6E0;
      --coral:       #FF6B6B;
      --coral-light: #FFE8E8;
      --radius-sm:   10px;
      --radius-md:   16px;
      --radius-lg:   24px;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-ui:      'DM Sans', system-ui, sans-serif;
      --shadow:       0 2px 12px rgba(28,35,51,0.08);
      --shadow-md:    0 4px 24px rgba(28,35,51,0.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-ui);
      background: var(--surface);
      color: var(--text);
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top Bar ── */
    .top-bar {
      background: var(--base);
      padding: 20px 24px 16px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .top-bar__greeting { color: var(--text-inv); opacity: 0.55; font-size: 13px; font-weight: 400; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 4px; }
    .top-bar__title { font-family: var(--font-display); color: var(--text-inv); font-size: 22px; font-weight: 500; }
    .top-bar__streak { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .streak-flame { font-size: 22px; line-height: 1; }
    .streak-label { color: var(--amber); font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }

    /* ── Pages ── */
    .page { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .page.active { display: flex; }

    /* ── Scroll Area ── */
    .scroll-area { flex: 1; overflow-y: auto; padding: 24px 20px 100px; display: flex; flex-direction: column; gap: 28px; }

    /* ── Section Label ── */
    .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-soft); margin-bottom: -16px; }

    /* ── Daily Card ── */
    .daily-card { background: var(--base); border-radius: var(--radius-lg); padding: 28px 24px 24px; box-shadow: var(--shadow-md); position: relative; overflow: hidden; }
    .daily-card__glow { position: absolute; top: -40px; right: -40px; width: 160px; height: 160px; border-radius: 50%; background: var(--teal); opacity: 0.12; pointer-events: none; }
    .daily-card__eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--teal); margin-bottom: 10px; }
    .daily-card__name { font-family: var(--font-display); color: var(--text-inv); font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 8px; line-height: 1.15; }
    .daily-card__desc { color: var(--text-inv); opacity: 0.6; font-size: 14px; line-height: 1.55; margin-bottom: 24px; }
    .daily-card__steps { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .step-pill { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 100px; padding: 5px 12px; font-size: 12px; font-weight: 500; color: var(--text-inv); }
    .daily-card__actions { display: flex; gap: 10px; }

    /* ── Buttons ── */
    .btn { border: none; cursor: pointer; font-family: var(--font-ui); font-weight: 600; font-size: 13px; letter-spacing: 0.02em; border-radius: 100px; padding: 10px 20px; transition: opacity 0.15s, transform 0.1s; }
    .btn:active { transform: scale(0.97); }
    .btn--primary { background: var(--teal); color: var(--base); flex: 1; }
    .btn--ghost { background: rgba(255,255,255,0.1); color: var(--text-inv); }
    .btn--outline { background: transparent; color: var(--text); border: 1.5px solid var(--surface-alt); }
    .btn--dark { background: var(--base); color: var(--text-inv); }

    /* ── Pillar Row ── */
    .pillar-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .pillar-tile { border-radius: var(--radius-md); padding: 16px 12px 14px; display: flex; flex-direction: column; gap: 8px; cursor: pointer; transition: transform 0.15s; }
    .pillar-tile:active { transform: scale(0.97); }
    .pillar-tile--teal  { background: var(--teal-light); }
    .pillar-tile--amber { background: var(--amber-light); }
    .pillar-tile--coral { background: var(--coral-light); }
    .pillar-tile__icon { font-size: 22px; line-height: 1; }
    .pillar-tile__name { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; color: var(--text); line-height: 1.3; }
    .pillar-tile__count { font-size: 11px; color: var(--text-soft); }

    /* ── Progress Strip ── */
    .progress-strip { background: #fff; border-radius: var(--radius-md); padding: 18px 20px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 16px; }
    .progress-strip__label { font-size: 13px; font-weight: 500; color: var(--text-soft); flex: 1; }
    .progress-strip__label strong { color: var(--text); font-weight: 600; }
    .progress-bars { display: flex; gap: 4px; align-items: flex-end; }
    .progress-bar { width: 6px; border-radius: 100px; background: var(--surface-alt); transition: height 0.4s; }

    /* ── Card List ── */
    .card-list { display: flex; flex-direction: column; gap: 10px; }
    .framework-card { background: #fff; border-radius: var(--radius-md); padding: 16px 18px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 14px; cursor: pointer; transition: transform 0.15s; border-left: 4px solid transparent; }
    .framework-card:active { transform: scale(0.98); }
    .framework-card--teal  { border-left-color: var(--teal); }
    .framework-card--amber { border-left-color: var(--amber); }
    .framework-card--coral { border-left-color: var(--coral); }
    .framework-card__body { flex: 1; min-width: 0; }
    .framework-card__name { font-family: var(--font-display); font-size: 16px; font-weight: 500; margin-bottom: 3px; }
    .framework-card__desc { font-size: 12px; color: var(--text-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .framework-card__badge { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
    .badge--mastered { background: #E8F5E9; color: #2E7D32; }
    .badge--review   { background: var(--amber-light); color: #b8860b; }
    .badge--new      { background: var(--surface-alt); color: var(--text-soft); }

    /* ── Study View ── */
    .study-header { background: var(--base); padding: 20px 24px 28px; position: relative; overflow: hidden; }
    .study-header__glow { position: absolute; top: -60px; right: -60px; width: 200px; height: 200px; border-radius: 50%; background: var(--teal); opacity: 0.1; pointer-events: none; }
    .study-header__back { background: rgba(255,255,255,0.1); border: none; color: var(--text-inv); font-family: var(--font-ui); font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 100px; cursor: pointer; margin-bottom: 20px; display: inline-flex; align-items: center; gap: 6px; }
    .study-header__eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--teal); margin-bottom: 8px; }
    .study-header__name { font-family: var(--font-display); color: var(--text-inv); font-size: 32px; font-weight: 600; margin-bottom: 6px; }
    .study-header__desc { color: var(--text-inv); opacity: 0.65; font-size: 15px; line-height: 1.5; }
    .study-body { flex: 1; overflow-y: auto; padding: 24px 20px 100px; display: flex; flex-direction: column; gap: 16px; }
    .study-step { background: #fff; border-radius: var(--radius-md); padding: 18px 20px; box-shadow: var(--shadow); display: flex; gap: 14px; align-items: flex-start; }
    .study-step__number { width: 32px; height: 32px; border-radius: 50%; background: var(--teal-light); color: var(--teal); font-weight: 700; font-size: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .study-step__letter { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .study-step__meaning { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .study-step__tip { font-size: 12px; color: var(--text-soft); line-height: 1.5; }
    .study-actions { display: flex; gap: 10px; padding: 0 20px 24px; flex-shrink: 0; }

    /* ── Flashcard ── */
    .flashcard-wrap { flex: 1; display: flex; flex-direction: column; padding: 24px 20px; gap: 20px; overflow-y: auto; padding-bottom: 100px; }
    .flashcard-progress-bar { height: 4px; background: var(--surface-alt); border-radius: 100px; overflow: hidden; }
    .flashcard-progress-fill { height: 100%; background: var(--teal); border-radius: 100px; transition: width 0.3s; }
    .flashcard-counter { font-size: 12px; color: var(--text-soft); text-align: center; font-weight: 500; }
    .flashcard { background: var(--base); border-radius: var(--radius-lg); padding: 40px 28px; box-shadow: var(--shadow-md); position: relative; overflow: hidden; min-height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; cursor: pointer; transition: transform 0.15s; }
    .flashcard:active { transform: scale(0.98); }
    .flashcard__glow { position: absolute; top: -60px; right: -60px; width: 200px; height: 200px; border-radius: 50%; opacity: 0.1; pointer-events: none; }
    .flashcard__hint { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--teal); margin-bottom: 16px; }
    .flashcard__name { font-family: var(--font-display); color: var(--text-inv); font-size: 36px; font-weight: 600; margin-bottom: 10px; }
    .flashcard__desc { color: var(--text-inv); opacity: 0.6; font-size: 14px; line-height: 1.5; }
    .flashcard__tap { color: var(--text-inv); opacity: 0.35; font-size: 12px; margin-top: 20px; }

    /* Revealed state */
    .flashcard.revealed { background: #fff; cursor: default; }
    .flashcard.revealed .flashcard__name { color: var(--text); }
    .flashcard.revealed .flashcard__desc { color: var(--text-soft); opacity: 1; }
    .flashcard.revealed .flashcard__hint { color: var(--teal); }
    .flashcard.revealed .flashcard__tap { display: none; }
    .flashcard-steps-reveal { display: none; width: 100%; margin-top: 16px; }
    .flashcard.revealed .flashcard-steps-reveal { display: flex; flex-direction: column; gap: 8px; }
    .reveal-step { background: var(--teal-light); border-radius: var(--radius-sm); padding: 10px 14px; display: flex; gap: 10px; align-items: center; }
    .reveal-step__letter { font-family: var(--font-display); font-weight: 600; font-size: 16px; color: var(--teal); width: 20px; }
    .reveal-step__text { font-size: 13px; color: var(--text); font-weight: 500; }
    .flashcard-verdict { display: none; flex-direction: column; gap: 10px; }
    .flashcard-verdict.show { display: flex; }
    .verdict-label { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-soft); text-align: center; }
    .verdict-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn--mastered { background: #E8F5E9; color: #2E7D32; border: none; cursor: pointer; font-family: var(--font-ui); font-weight: 600; font-size: 13px; border-radius: 100px; padding: 12px; transition: transform 0.1s; }
    .btn--again    { background: var(--amber-light); color: #b8860b; border: none; cursor: pointer; font-family: var(--font-ui); font-weight: 600; font-size: 13px; border-radius: 100px; padding: 12px; transition: transform 0.1s; }
    .btn--mastered:active, .btn--again:active { transform: scale(0.97); }
    .flashcard-done { text-align: center; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .flashcard-done__emoji { font-size: 56px; }
    .flashcard-done__title { font-family: var(--font-display); font-size: 24px; font-weight: 600; }
    .flashcard-done__sub { font-size: 14px; color: var(--text-soft); line-height: 1.5; }

    /* ── Library Page ── */
    .library-filter { display: flex; gap: 8px; padding: 16px 20px 0; overflow-x: auto; flex-shrink: 0; }
    .filter-chip { border: none; background: var(--surface-alt); color: var(--text-soft); font-family: var(--font-ui); font-size: 12px; font-weight: 600; padding: 7px 16px; border-radius: 100px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .filter-chip.active { background: var(--base); color: var(--text-inv); }

    /* ── Bottom Nav ── */
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #fff; border-top: 1px solid rgba(28,35,51,0.07); display: flex; padding: 10px 0 20px; box-shadow: 0 -4px 20px rgba(28,35,51,0.06); z-index: 100; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 0; border: none; background: none; font-family: var(--font-ui); }
    .nav-item__icon { font-size: 20px; line-height: 1; }
    .nav-item__label { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-soft); }
    .nav-item.active .nav-item__label { color: var(--base); }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-soft); font-size: 14px; line-height: 1.6; }
    .empty-state__emoji { font-size: 40px; margin-bottom: 12px; }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <header class="top-bar">
    <div>
      <div class="top-bar__greeting" id="greeting">Good morning</div>
      <div class="top-bar__title">Speak Well</div>
    </div>
    <div class="top-bar__streak">
      <div class="streak-flame">🔥</div>
      <div class="streak-label" id="streakLabel">Day 1</div>
    </div>
  </header>

  <!-- ══ HOME PAGE ══ -->
  <div class="page active" id="page-home">
    <div class="scroll-area">

      <div>
        <div class="section-label">Today's focus</div>
        <div style="height:16px"></div>
        <div class="daily-card" id="dailyCard">
          <div class="daily-card__glow"></div>
          <div class="daily-card__eyebrow">🧩 Framework</div>
          <div class="daily-card__name" id="dailyName">—</div>
          <div class="daily-card__desc" id="dailyDesc">—</div>
          <div class="daily-card__steps" id="dailySteps"></div>
          <div class="daily-card__actions">
            <button class="btn btn--primary" onclick="startPracticeFromDaily()">Practice now</button>
            <button class="btn btn--ghost" onclick="studyFromDaily()">Study first</button>
          </div>
        </div>
      </div>

      <div>
        <div class="section-label">Browse by pillar</div>
        <div style="height:16px"></div>
        <div class="pillar-row">
          <div class="pillar-tile pillar-tile--teal" onclick="showLibrary('frameworks')">
            <div class="pillar-tile__icon">🧩</div>
            <div class="pillar-tile__name">Frame­works</div>
            <div class="pillar-tile__count">16 cards</div>
          </div>
          <div class="pillar-tile pillar-tile--amber" onclick="showLibrary('everyday')">
            <div class="pillar-tile__icon">💬</div>
            <div class="pillar-tile__name">Every­day English</div>
            <div class="pillar-tile__count">8 cards</div>
          </div>
          <div class="pillar-tile pillar-tile--coral" onclick="showLibrary('speaking')">
            <div class="pillar-tile__icon">🎤</div>
            <div class="pillar-tile__name">Public Speaking</div>
            <div class="pillar-tile__count">9 cards</div>
          </div>
        </div>
      </div>

      <div class="progress-strip">
        <div class="progress-strip__label">
          <strong id="masteredCount">0</strong> cards mastered
        </div>
        <div class="progress-bars" id="progressBars"></div>
      </div>

      <div>
        <div class="section-label">All frameworks</div>
        <div style="height:16px"></div>
        <div class="card-list" id="homeCardList"></div>
      </div>

      <div>
        <div class="section-label">Everyday English</div>
        <div style="height:16px"></div>
        <div class="card-list" id="homeEverydayList"></div>
      </div>

      <div>
        <div class="section-label">Public Speaking</div>
        <div style="height:16px"></div>
        <div class="card-list" id="homeSpeakingList"></div>
      </div>

    </div>
  </div>
  <div class="page" id="page-library">
    <div class="library-filter">
      <button class="filter-chip active" onclick="filterLibrary('all', this)">All</button>
      <button class="filter-chip" onclick="filterLibrary('frameworks', this)">🧩 Frameworks</button>
      <button class="filter-chip" onclick="filterLibrary('everyday', this)">💬 Everyday</button>
      <button class="filter-chip" onclick="filterLibrary('speaking', this)">🎤 Speaking</button>
    </div>
    <div class="scroll-area">
      <div class="card-list" id="libraryCardList"></div>
    </div>
  </div>

  <!-- ══ PRACTICE PAGE ══ -->
  <div class="page" id="page-practice">
    <div class="flashcard-wrap" id="flashcardWrap"></div>
  </div>

  <!-- ══ STUDY VIEW (overlays on top) ══ -->
  <div class="page" id="page-study">
    <div class="study-header">
      <div class="study-header__glow"></div>
      <button class="study-header__back" onclick="goBack()">← Back</button>
      <div class="study-header__eyebrow" id="studyEyebrow">🧩 Framework</div>
      <div class="study-header__name" id="studyName">—</div>
      <div class="study-header__desc" id="studyDesc">—</div>
    </div>
    <div class="study-body" id="studyBody"></div>
    <div class="study-actions">
      <button class="btn btn--dark" style="flex:1" onclick="practiceCurrentStudy()">Practice this →</button>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="showPage('home', this)">
      <span class="nav-item__icon">🏠</span>
      <span class="nav-item__label">Home</span>
    </button>
    <button class="nav-item" onclick="showPage('library', this)">
      <span class="nav-item__icon">📚</span>
      <span class="nav-item__label">Library</span>
    </button>
    <button class="nav-item" onclick="showPage('practice', this)">
      <span class="nav-item__icon">🃏</span>
      <span class="nav-item__label">Practice</span>
    </button>
  </nav>

  <script>
  // ══════════════════════════════════════════════
  // DATA
  // ══════════════════════════════════════════════
  const FRAMEWORKS = [
    {
      id: 'ccc1', pillar: 'frameworks', name: 'CCC',
      bestFor: 'Any message, update, briefing',
      steps: [
        { letter: 'C', word: 'Context',    tip: 'Set the scene — what is happening and why it matters.' },
        { letter: 'C', word: 'Core Idea',  tip: 'Deliver your main point clearly and confidently.' },
        { letter: 'C', word: 'Connect',    tip: 'Link back to the listener — what should they do or feel?' }
      ]
    },
    {
      id: 'prep', pillar: 'frameworks', name: 'PREP',
      bestFor: 'Arguments, taking a position',
      steps: [
        { letter: 'P', word: 'Point',   tip: 'State your position upfront, clearly and directly.' },
        { letter: 'R', word: 'Reason',  tip: 'Explain the logic or evidence behind your point.' },
        { letter: 'E', word: 'Example', tip: 'Give a concrete story or data point to prove it.' },
        { letter: 'P', word: 'Point',   tip: 'Restate your position to leave it ringing in their ears.' }
      ]
    },
    {
      id: 'psb', pillar: 'frameworks', name: 'PSB',
      bestFor: 'Pitching, persuading, selling',
      steps: [
        { letter: 'P', word: 'Problem',  tip: 'Name the pain your audience already feels.' },
        { letter: 'S', word: 'Solution', tip: 'Introduce your idea as the clear answer.' },
        { letter: 'B', word: 'Benefit',  tip: 'Paint the picture of life after the solution.' }
      ]
    },
    {
      id: 'add', pillar: 'frameworks', name: 'ADD',
      bestFor: 'Answering questions confidently',
      steps: [
        { letter: 'A', word: 'Answer',           tip: 'Lead with the direct answer — no preamble.' },
        { letter: 'D', word: 'Detail',            tip: 'Add one layer of supporting information.' },
        { letter: 'D', word: 'Describe Relevance',tip: 'Explain why this matters to your listener.' }
      ]
    },
    {
      id: 'star', pillar: 'frameworks', name: 'STAR',
      bestFor: 'Stories, interviews, experience sharing',
      steps: [
        { letter: 'S', word: 'Situation', tip: 'Describe the context — when, where, who.' },
        { letter: 'T', word: 'Task',      tip: 'Explain what your responsibility was.' },
        { letter: 'A', word: 'Action',    tip: 'Walk through what YOU specifically did.' },
        { letter: 'R', word: 'Result',    tip: 'Share the outcome — ideally with numbers or impact.' }
      ]
    },
    {
      id: '4is', pillar: 'frameworks', name: "4 I's",
      bestFor: 'Giving feedback',
      steps: [
        { letter: 'I', word: 'Information',   tip: 'State what you observed — facts only, no judgement.' },
        { letter: 'I', word: 'Impact',         tip: 'Share the effect it had on you or the team.' },
        { letter: 'I', word: 'Invitation',     tip: 'Ask the person to share their perspective.' },
        { letter: 'I', word: 'Implications',   tip: 'Agree together on what happens next.' }
      ]
    },
    {
      id: 'aaa', pillar: 'frameworks', name: 'AAA',
      bestFor: 'Apologising sincerely',

  // localStorage helpers
  function getMastery() {
    try { return JSON.parse(localStorage.getItem('sw_mastery') || '{}'); } catch { return {}; }
  }
  function setMastery(obj) {
    localStorage.setItem('sw_mastery', JSON.stringify(obj));
  }
  function getStatus(id) {
    return getMastery()[id] || 'new'; // 'new' | 'review' | 'mastered'
  }
  function setStatus(id, status) {
    const m = getMastery(); m[id] = status; setMastery(m);
  }
  function getStreak() {
    try {
      const d = JSON.parse(localStorage.getItem('sw_streak') || '{"count":1,"last":""}');
      const today = new Date().toDateString();
      if (d.last === today) return d.count;
      if (d.last === new Date(Date.now() - 86400000).toDateString()) {
        const next = { count: d.count + 1, last: today };
        localStorage.setItem('sw_streak', JSON.stringify(next));
        return next.count;
      }
      const reset = { count: 1, last: today };
      localStorage.setItem('sw_streak', JSON.stringify(reset));
      return 1;
    } catch { return 1; }
  }

  function showPage(name, navBtn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    if (navBtn) navBtn.classList.add('active');
    if (name === 'practice') renderPractice([...FRAMEWORKS, ...EVERYDAY, ...SPEAKING]);
    if (name === 'library')  renderLibrary(currentFilter);
    if (name === 'home')     renderHome();
  }

  function showStudy(id, fromPage) {
    previousPage = fromPage || 'home';
    currentStudyId = id;
    const f = [...FRAMEWORKS, ...EVERYDAY, ...SPEAKING].find(x => x.id === id);
    if (!f) return;
    const pillarLabel = { frameworks: '🧩 Framework', everyday: '💬 Everyday English', speaking: '🎤 Public Speaking' };
    const pillarColor = { frameworks: 'var(--teal)', everyday: 'var(--amber)', speaking: 'var(--coral)' };
    const stepBg = { frameworks: 'var(--teal-light)', everyday: 'var(--amber-light)', speaking: 'var(--coral-light)' };
    const stepColor = { frameworks: 'var(--teal)', everyday: 'var(--amber)', speaking: 'var(--coral)' };
    document.getElementById('studyEyebrow').textContent = pillarLabel[f.pillar] || '🧩 Framework';
    document.getElementById('studyEyebrow').style.color = pillarColor[f.pillar] || 'var(--teal)';
    document.getElementById('studyName').textContent = f.name;
    document.getElementById('studyDesc').textContent = f.bestFor;
    const body = document.getElementById('studyBody');
    body.innerHTML = f.steps.map((s, i) => `
      <div class="study-step">
        <div class="study-step__number" style="background:${stepBg[f.pillar]};color:${stepColor[f.pillar]}">${i + 1}</div>
        <div>
          <div class="study-step__letter" style="color:${stepColor[f.pillar]}">${s.letter === '✓' ? '' : s.letter}</div>
          <div class="study-step__meaning">${s.word}</div>
          <div class="study-step__tip">${s.tip}</div>
        </div>
      </div>
    `).join('');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-study').classList.add('active');
  }

  function showLibrary(filter) {
    currentFilter = filter || 'all';
    showPage('library', document.querySelectorAll('.nav-item')[1]);
    filterLibrary(currentFilter);
  }

  function goBack() {
    showPage(previousPage, document.querySelectorAll('.nav-item')[previousPage === 'library' ? 1 : 0]);
  }

    // Daily focus — pick unmastered framework first
    const ALL = [...FRAMEWORKS, ...EVERYDAY, ...SPEAKING];
    const unmastered = FRAMEWORKS.filter(f => getStatus(f.id) !== 'mastered');
    const pool = unmastered.length > 0 ? unmastered : FRAMEWORKS;
    const daily = pool[Math.floor(Date.now() / 86400000) % pool.length];
    document.getElementById('dailyName').textContent = daily.name;
    document.getElementById('dailyDesc').textContent = daily.bestFor;
    document.getElementById('dailySteps').innerHTML =
      daily.steps.map(s => `<span class="step-pill">${s.word}</span>`).join('');
    document.getElementById('dailyCard').dataset.id = daily.id;

    // Progress — all cards combined
    const mastered = ALL.filter(f => getStatus(f.id) === 'mastered').length;
    document.getElementById('masteredCount').textContent = `${mastered} of ${ALL.length}`;
    const bars = document.getElementById('progressBars');
    bars.innerHTML = ALL.map(f => {
      const s = getStatus(f.id);
      const color = s === 'mastered' ? 'var(--teal)' : s === 'review' ? 'var(--amber)' : 'var(--surface-alt)';
      const height = s === 'mastered' ? '28px' : s === 'review' ? '18px' : '10px';
      return `<div class="progress-bar" style="background:${color};height:${height}"></div>`;
    }).join('');

    // Card lists
    renderCardList(document.getElementById('homeCardList'), FRAMEWORKS, 'home');
    renderCardList(document.getElementById('homeEverydayList'), EVERYDAY, 'home');
    renderCardList(document.getElementById('homeSpeakingList'), SPEAKING, 'home');
  }

  function startPracticeFromDaily() {
    showPage('practice', document.querySelectorAll('.nav-item')[2]);
    renderPractice([...FRAMEWORKS, ...EVERYDAY, ...SPEAKING]);
  }
  function studyFromDaily() {
    const id = document.getElementById('dailyCard').dataset.id;
    showStudy(id, 'home');
  }
  function practiceCurrentStudy() {
    showPage('practice', document.querySelectorAll('.nav-item')[2]);
    renderPractice(FRAMEWORKS.filter(f => f.id === currentStudyId));
  }

  // ══════════════════════════════════════════════
  // CARD LIST (shared renderer)
  // ══════════════════════════════════════════════
  function badgeHTML(status) {
    if (status === 'mastered') return `<div class="framework-card__badge badge--mastered">✓</div>`;
    if (status === 'review')   return `<div class="framework-card__badge badge--review">↩</div>`;
    return `<div class="framework-card__badge badge--new">○</div>`;
  }

  function renderCardList(el, items, fromPage) {
    const pillarClass = { frameworks: 'teal', everyday: 'amber', speaking: 'coral' };
    el.innerHTML = items.map(f => {
      const cls = pillarClass[f.pillar] || 'teal';
      const status = getStatus(f.id);
      return `
        <div class="framework-card framework-card--${cls}" onclick="showStudy('${f.id}','${fromPage}')">
          <div class="framework-card__body">
            <div class="framework-card__name">${f.name}</div>
            <div class="framework-card__desc">${f.bestFor}</div>
          </div>
          ${badgeHTML(status)}
        </div>`;
    }).join('');
  }

  // ══════════════════════════════════════════════
  // LIBRARY
  // ══════════════════════════════════════════════
  function filterLibrary(filter, chip) {
    currentFilter = filter;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    if (chip) chip.classList.add('active');
    renderLibrary(filter);
  }

  function renderLibrary(filter) {
    const el = document.getElementById('libraryCardList');
    let items = [];
    if (filter === 'all')        items = [...FRAMEWORKS, ...EVERYDAY, ...SPEAKING];
    else if (filter === 'frameworks') items = FRAMEWORKS;
    else if (filter === 'everyday')   items = EVERYDAY;
    else if (filter === 'speaking')   items = SPEAKING;
    renderCardList(el, items, 'library');
  }

  // ══════════════════════════════════════════════
  // PRACTICE / FLASHCARDS
  // ══════════════════════════════════════════════
  function renderPractice(queue) {
    currentPracticeQueue = [...queue];
    currentCardIndex = 0;
    isRevealed = false;
    showCard();
  }

  function showCard() {
    const wrap = document.getElementById('flashcardWrap');
    if (currentCardIndex >= currentPracticeQueue.length) {
      showDone(wrap);
      return;
    }
    const f = currentPracticeQueue[currentCardIndex];
    const total = currentPracticeQueue.length;
    const pct = Math.round((currentCardIndex / total) * 100);
    const pillarColor = { frameworks: 'var(--teal)', everyday: 'var(--amber)', speaking: 'var(--coral)' };
    const pillarLabel = { frameworks: '🧩 Framework', everyday: '💬 Everyday English', speaking: '🎤 Public Speaking' };
    const revealBg = { frameworks: 'var(--teal-light)', everyday: 'var(--amber-light)', speaking: 'var(--coral-light)' };
    const revealColor = { frameworks: 'var(--teal)', everyday: 'var(--amber)', speaking: 'var(--coral)' };
    const pColor = pillarColor[f.pillar] || 'var(--teal)';
    const rBg    = revealBg[f.pillar]   || 'var(--teal-light)';
    const rColor = revealColor[f.pillar] || 'var(--teal)';

    wrap.innerHTML = `
      <div class="flashcard-progress-bar"><div class="flashcard-progress-fill" style="width:${pct}%;background:${pColor}"></div></div>
      <div class="flashcard-counter">${currentCardIndex + 1} of ${total}</div>

      <div class="flashcard" id="fc" onclick="revealCard()">
        <div class="flashcard__glow" style="background:${pColor}"></div>
        <div class="flashcard__hint" style="color:${pColor}">${pillarLabel[f.pillar] || '🧩 Framework'}</div>
        <div class="flashcard__name">${f.name}</div>
        <div class="flashcard__desc">${f.bestFor}</div>
        <div class="flashcard-steps-reveal" id="fcSteps">
          ${f.steps.map(s => `
            <div class="reveal-step" style="background:${rBg}">
              <div class="reveal-step__letter" style="color:${rColor}">${s.letter === '✓' ? '→' : s.letter}</div>
              <div class="reveal-step__text">${s.word}</div>
            </div>`).join('')}
        </div>
        <div class="flashcard__tap">Tap to reveal</div>
      </div>

      <div class="flashcard-verdict" id="fcVerdict">
        <div class="verdict-label">How did you do?</div>
        <div class="verdict-btns">
          <button class="btn--again"    onclick="markCard('review')">↩ Review again</button>
          <button class="btn--mastered" onclick="markCard('mastered')">✓ Got it!</button>
        </div>
      </div>
    `;
  }

  function revealCard() {
    if (isRevealed) return;
    isRevealed = true;
    const fc = document.getElementById('fc');
    fc.classList.add('revealed');
    fc.onclick = null;
    document.getElementById('fcVerdict').classList.add('show');
  }

  function markCard(status) {
    const f = currentPracticeQueue[currentCardIndex];
    setStatus(f.id, status);
    currentCardIndex++;
    isRevealed = false;
    showCard();
  }

  function showDone(wrap) {
    const mastered = currentPracticeQueue.filter(f => getStatus(f.id) === 'mastered').length;
    wrap.innerHTML = `
      <div class="flashcard-done">
        <div class="flashcard-done__emoji">🎉</div>
        <div class="flashcard-done__title">Session complete!</div>
        <div class="flashcard-done__sub">You reviewed ${currentPracticeQueue.length} cards.<br>${mastered} marked as mastered.</div>
        <button class="btn btn--dark" style="margin-top:8px" onclick="renderPractice([...FRAMEWORKS,...EVERYDAY,...SPEAKING])">Practice all again</button>
      </div>
    `;
    renderHome(); // refresh progress on home
  }

  // ══════════════════════════════════════════════
  // INIT
  // ══════════════════════════════════════════════
  renderHome();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
  </script>
</body>
</html>
